name: Package Windows

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: false
        type: string
  release:
    types: [published]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-python
            mingw-w64-x86_64-python-gobject
            mingw-w64-x86_64-gtk4
            mingw-w64-x86_64-python-pip

      - name: Install Python dependencies
        shell: msys2 {0}
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Install dependencies
        shell: msys2 {0}
        run: |
          pip install "jsonschema>=4.0.0,<4.18.0" markdown-it-py --break-system-packages --prefer-binary

      - name: Run build script
        shell: msys2 {0}
        run: |
          python scripts/build_gui.py

      - name: Stage artifacts
        shell: bash
        run: |
          # The dist folder contains the app files (hmsim.exe, _internal, etc.)
          mkdir -p staging/hmsim
          cp -rv dist/* staging/hmsim/
          # Ensure we don't have nested hmsim/hmsim directory
          if [ -d staging/hmsim/hmsim ]; then
            mv staging/hmsim/hmsim/* staging/hmsim/
            rm -rf staging/hmsim/hmsim
          fi
          ls -R staging/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hmsim-windows
          path: staging
          retention-days: 14

      - name: Upload to Release
        if: github.event_name == 'release'
        run: |
          cd staging
          Compress-Archive -Path hmsim -DestinationPath ../hmsim-windows-${{ github.event.release.tag_name }}.zip -Force
          cd ..

      - name: Attach to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: hmsim-windows-${{ github.event.release.tag_name }}.zip
          draft: false
          prerelease: ${{ contains(github.event.release.tag_name, 'alpha') || contains(github.event.release.tag_name, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
