name: Package Windows

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: false
        type: string
  release:
    types: [published]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-python
            mingw-w64-x86_64-python-gobject
            mingw-w64-x86_64-gtk4
            mingw-w64-x86_64-fontconfig
            mingw-w64-x86_64-ttf-dejavu
            mingw-w64-x86_64-python-pip
            mingw-w64-x86_64-gobject-introspection
            mingw-w64-x86_64-pyinstaller
            mingw-w64-x86_64-pyinstaller-hooks-contrib
            mingw-w64-x86_64-python-jsonschema
            mingw-w64-x86_64-python-jsonschema-specifications
            mingw-w64-x86_64-python-markdown-it-py
            mingw-w64-x86_64-adwaita-icon-theme
            mingw-w64-x86_64-hicolor-icon-theme

      - name: Install dependencies
        shell: msys2 {0}
        run: |
          pip install --upgrade pip --break-system-packages
          # Install hmsim normally to ensure it is in site-packages
          pip install . --break-system-packages --no-deps

      - name: Run build script
        shell: msys2 {0}
        run: |
          echo "DEBUG: Locating Gtk-4.0.typelib..."
          find /mingw64 -name "Gtk-4.0.typelib"
          python scripts/build_gui.py

      - name: Stage artifacts
        shell: bash
        run: |
          # Create a clean directory structure for the zip
          mkdir -p final_zip/hmsim
          # Copy dist contents to hmsim/
          cp -rp dist/* final_zip/hmsim/
          echo "Final Zip structure verification (final_zip/):"
          ls -R final_zip/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hmsim-windows
          path: final_zip/
          retention-days: 7

      - name: Upload to Release
        if: github.event_name == 'release'
        run: |
          cd final_zip
          Compress-Archive -Path hmsim -DestinationPath ../hmsim-windows-${{ github.event.release.tag_name }}.zip -Force
          cd ..

      - name: Attach to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: hmsim-windows-${{ github.event.release.tag_name }}.zip
          draft: false
          prerelease: ${{ contains(github.event.release.tag_name, 'alpha') || contains(github.event.release.tag_name, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
