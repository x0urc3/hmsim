name: Package Windows

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: false
        type: string
  release:
    types: [published]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-python
            mingw-w64-x86_64-python-gobject
            mingw-w64-x86_64-gtk4
            mingw-w64-x86_64-python-pip

      - name: Install Python dependencies
        shell: msys2 {0}
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Install dependencies
        shell: msys2 {0}
        run: |
          pip install "jsonschema>=4.0.0,<4.18.0" markdown-it-py --break-system-packages --prefer-binary
          # Install hmsim normally to ensure it is in site-packages
          pip install . --break-system-packages --no-deps

      - name: Run build script
        shell: msys2 {0}
        run: |
          echo "DEBUG: Locating Gtk-4.0.typelib..."
          find /mingw64 /ucrt64 -name "Gtk-4.0.typelib" 2>/dev/null || echo "Not found"
          echo "DEBUG: Checking /mingw64/lib/girepository-1.0 contents:"
          ls /mingw64/lib/girepository-1.0 | grep Gtk || echo "No Gtk typelibs found in /mingw64"
          python scripts/build_gui.py

      - name: Stage artifacts
        shell: bash
        run: |
          # The dist folder already contains hmsim.exe, _internal, examples, etc.
          # We want to wrap it in a folder named 'hmsim' for the zip.
          mkdir -p final_zip/hmsim

          # Copy all contents from dist/ to final_zip/hmsim/
          cp -rp dist/* final_zip/hmsim/

          # Ensure examples/ is directly under hmsim/ (already true if dist/ had it)

          echo "Zip structure verification (final_zip/):"
          ls -R final_zip/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hmsim-windows
          path: final_zip/
          retention-days: 7


      - name: Upload to Release
        if: github.event_name == 'release'
        run: |
          cd final_zip
          Compress-Archive -Path hmsim -DestinationPath ../hmsim-windows-${{ github.event.release.tag_name }}.zip -Force
          cd ..

      - name: Attach to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: hmsim-windows-${{ github.event.release.tag_name }}.zip
          draft: false
          prerelease: ${{ contains(github.event.release.tag_name, 'alpha') || contains(github.event.release.tag_name, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
